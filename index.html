<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portfolio — Projets</title>
  <meta name="description" content="Présentation de projets finis et en cours — responsive pour mobile et PC" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="./Presentation/effect.css" type="text/css">


</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="hex">TW</div>
        <div>
          <div class="social-icons">
            <a href="https://www.instagram.com/w.tommy_05/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="#" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fas fa-envelope"></i></a>
          </div>
          <h1>Portfolio — Projets</h1>
          <p class="lead">Projets terminés et en cours de Tom Wilhem</p>
        </div>
      </div>
      <div class="controls">
        <input class="search" id="search" placeholder="Rechercher un projet..." />
        <div class="toggle">
          <button class="btn" data-filter="all">Tous</button>
          <button class="btn" data-filter="finished">Terminés</button>
          <button class="btn" data-filter="ongoing">En cours</button>
        </div>
      </div>
    </header>

    <h2>Projets</h2>
    <main>
      <section id="projects" class="grid">
      </section>

      <div class="modal" id="modal">
        <div class="box"><img id="modal-img" alt="Aperçu du projet" /></div>
      </div>
    </main>

    <footer>
      <div>© Tom Wilhem</div>
    </footer>
  </div>

  <script>
    const grid = document.getElementById('projects');
    const buttons = document.querySelectorAll('[data-filter]');
    const search = document.getElementById('search');
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-img');

    // Fonction pour créer un article
    function createArticle(projet) {
      const article = document.createElement('article');
      article.className = 'card';
      article.dataset.status = projet.status;
      article.dataset.title = projet.title;

      article.innerHTML = `
        <div class="media" style="background-image:url('${projet.background}')"></div>
        <div class="content">
          <div class="meta">
            <div>
              <div class="title">${projet.title}</div>
              <div class="desc">${projet.desc}</div>
            </div>
            <div class="status ${projet.status}">${projet.status === 'finished' ? 'Terminé' : 'En cours'}</div>
          </div>
          <div class="actions">
            <a class="link-btn" href="${projet.Github}" target="_blank">Github</a>
            <a class="link-btn" href="${projet.homepage}" target="_blank">Homepage</a>
          </div>
        </div>
      `;
      return article;
    }

    // Charger les projets depuis le fichier JSON
    fetch('./Presentation/Projets.json')
      .then(response => response.json())
      .then(data => {
        const cards = [];
        data.Projets.forEach(projet => {
          const article = createArticle(projet);
          grid.appendChild(article);
          cards.push(article);
        });

        // Filtrage
        function applyFilter(type){
          cards.forEach(c=>{
            const status = c.dataset.status;
            c.style.display = (type==='all' || status===type) ? 'flex' : 'none';
          });
        }
        buttons.forEach(b => b.addEventListener('click', ()=> applyFilter(b.dataset.filter)));

        // Recherche
        search.addEventListener('input', e=>{
          const q = e.target.value.toLowerCase();
          cards.forEach(c=>{
            const title = c.dataset.title.toLowerCase();
            const desc = c.querySelector('.desc')?.textContent.toLowerCase() || '';
            c.style.display = (title.includes(q) || desc.includes(q)) ? 'flex' : 'none';
          });
        });

        // Modal
        document.querySelectorAll('[data-open]').forEach(btn=>{
          btn.addEventListener('click', ()=>{
            modalImg.src = btn.dataset.open;
            modal.style.display='flex';
          });
        });
        modal.addEventListener('click', ()=>{ modal.style.display='none'; modalImg.src=''; });
        document.addEventListener('keydown', e=>{ if(e.key==='Escape') { modal.style.display='none'; modalImg.src='' } });
      })
      .catch(err => console.error('Erreur lors du chargement du JSON :', err));
    </script>
    
</body>
</html>
